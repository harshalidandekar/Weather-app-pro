<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather App</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="main-container">
<header class="input-container">
<input class="city-input" placeholder="Search City" type="text">
<button class="search-btn">
<span class="material-symbols-outlined">search</span>
</button>
</header>

<section class="weather-info">
<div class="location-date-container">
<div class="location">
<span class="material-symbols-outlined">location_on</span>
<h4 class="country-txt">City Name</h4>
</div>
<h5 class="current-date-txt">Date</h5>
</div>

<div class="weather-summary-container">
<img class="weather-summary-img" src="assets/weather/clouds.svg" alt="weather icon">
<div class="weather-summary-info">
<h1 class="temp-text">25°C</h1>
<h3 class="condition-txt">Cloudy</h3>
</div>
</div>

<div class="weather-condition-container">
<div class="condition-item">
<span class="material-symbols-outlined">water_drop</span>
<div>
<h5>Humidity</h5>
<h5 class="humidity-value-txt">50%</h5>
</div>
</div>

<div class="condition-item">
<span class="material-symbols-outlined">air</span>
<div>
<h5>Wind Speed</h5>
<h5 class="wind-value-txt">2 m/s</h5>
</div>
</div>
</div>
</section>

<section class="section-message">
<img class="message-img" src="assets/message/search-city.png" alt="search">
<h2>Search a City</h2>
<p>Check temperature and weather conditions</p>
</section>
</main>
<script src="script.js"></script>
</body>
</html>
